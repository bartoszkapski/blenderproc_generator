# config.yaml
main_folder: "/home/hampthamanta/code/magisterka"
datasets:
  ycb: "/BlenderProc/resources/ycb/models/ycb"
  blenderkit: "/BlenderProc/resources/BlenderKit_models/scenes"
  pix3d: "/BlenderProc/resources/pix3d/model/"
  hdri: "/BlenderProc/resources/hdri/"
  handal: "/BlenderProc/resourceshandal/models"
  hope: "/BlenderProc/resources/hope/models"
  ruapc: "/BlenderProc/resources/ruapc/models"
  tless: "/BlenderProc/resources/tless_models/models_cad"
  
output: "/dataset_generator/output/"

settings:
  obj_freq: # 0.0 - 1.0
    ycb: 0.5
    pix3d: 0.01
    handal: 0.5
    hope: 0.5
    ruapc: 0.5
    tless: 0.5
  scene_sources:
    scenenet: false
    blenderkit: true
  blenderkit_weight: 1  # multiplier for BlenderKit scene selection chance
  resolution_RGB: [1920, 1080]  # Remainder of camera resollution
  resolution_D: [1024, 1024]    # Remainder of camera resollution
  render_samples: 512 # Legacy fallback used when rgb_samples is not set.
  rgb_samples: 512   # Balanced speed/quality; noticeably faster than 1536 with small quality impact.
  rgb_noise_threshold: 0.007   # Slightly looser adaptive threshold for faster convergence.
  rgb_adaptive_min_samples: 24
  rgb_indirect_clamp: 1.5      # Lower values reduce fireflies/noise.
  rgb_enable_caustics: false   # Caustics off = much cleaner indoor renders.
  rgb_png_compression: 0       # PNG is lossless anyway; 0 is fastest export.

  # Camera angle perturbation (augmentation)
  camera_perturbation:
    probability: 0.25       # chance of applying perturbation per pose
    pitch_range: [-45, 30] # degrees, up/down tilt
    roll_range: [-25, 25]  # degrees, sideways tilt

  # Minimum visible objects constraint
  camera_proximity:
    min_objects: 3         # min distinct objects (not walls/floors) in view
    min_dist: 0.25          # meters minimum distance
    max_dist: 2.5          # meters maximum distance
    max_attempts: 400      # max number of camera pose sampling attempts

  # Camera sampling parameters (ray-casting, positioning, constraints)
  camera_sampling:
    # Adaptive visibility thresholds based on scene size
    adaptive_scaling_reference: 5.0  # reference scene diagonal (units)
    min_dist_percent: 0.05           # min_dist = scene_diag * this * scale_factor
    max_dist_percent: 0.7            # max_dist = scene_diag * this * (1.0 - scale_factor*0.5)
    
    # Camera positioning in scene
    margin_normal: 0.15              # distance from walls (normal mode, 15%)
    margin_force_accept: 0.05        # distance from walls (force_accept mode, 5%)
    
    # Camera height constraints (relative to room height)
    cam_z_min_percent: 0.10          # camera min height = floor + room_height * this
    cam_z_max_percent: 0.75          # camera max height = floor + room_height * this
    
    # Camera near/far clipping planes (meters)
    clip_start: 0.1                  # near plane - objects closer than this won't render
    clip_end: 10.0                   # far plane - objects farther than this won't render
    
    # Ray-casting visibility check
    ray_grid_size: 5                 # 5x5 grid of rays (25 total rays per check)
    ray_spread: 0.35                 # ray spread in radians (~20 degrees off-axis)
    ray_hit_threshold: 0.4           # min fraction of rays that must hit geometry (40%)
    max_background_dist_m: 20.0       # steer look-at sampling toward scene content within this distance
    
    # Wall/ceiling detection
    flat_wall_std_threshold: 0.05    # if std < 5% of mean, view is flat wall (reject)
    
    # Camera pose spacing
    inter_pose_distance_factor: 0.5  # min_inter_pose_dist = scene_diag / (num_samples+1) * this
